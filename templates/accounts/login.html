<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Graduate Connect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    /*
      CSS DESIGN EXPLANATION:
      We use CSS custom properties (variables) at the top so we can change
      the entire color scheme from one place. This is best practice.

      --navy: The darkest blue — used for backgrounds and headings.
              Conveys authority and trust (important for a university platform).
      --blue: The primary action color — used for buttons and links.
              Bright enough to draw attention without being harsh.
      --blue-light: A very pale blue — used for subtle backgrounds and hover states.
      --white: Pure white for card backgrounds.
      --slate: A warm dark gray for body text — easier on the eyes than pure black.
      --muted: A lighter gray for secondary/placeholder text.
      --border: A very light gray for input borders and dividers.
    */
    :root {
      --navy:       #0f2744;
      --navy-mid:   #1a3a5c;
      --blue:       #3b82f6;
      --blue-dark:  #2563eb;
      --blue-light: #eff6ff;
      --white:      #ffffff;
      --slate:      #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --success:    #16a34a;
      --error:      #dc2626;
    }

    /* Reset — removes default browser margin/padding and sets box-sizing
       so padding doesn't add to element width */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* The body fills the full viewport height and centers content both
       horizontally and vertically using flexbox */
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 40%, #1e4080 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* The wrapper constrains the card to a max width on large screens */
    .wrapper { width: 100%; max-width: 420px; }

    /* Brand section above the card — the logo icon and title */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--white);
    }

    /* The icon container — a frosted glass effect using rgba background
       and backdrop-filter blur */
    .brand-icon {
      width: 68px; height: 68px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      backdrop-filter: blur(8px);
    }

    .brand h1 { font-size: 1.65rem; font-weight: 800; letter-spacing: -0.5px; }
    .brand p  { font-size: .85rem; opacity: .7; margin-top: .25rem; }

    /* The white card — uses border-radius for rounded corners,
       box-shadow for depth, and overflow:hidden to clip child elements */
    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
    }

    .card h2 { font-size: 1.45rem; font-weight: 800; color: var(--slate); margin-bottom: .3rem; }
    .card .sub { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }

    /* Form group — adds spacing between each field */
    .field { margin-bottom: 1.1rem; }

    /* Labels — small, bold, dark */
    label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: var(--slate);
      margin-bottom: .4rem;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    /* Input fields — full width, rounded, with a subtle border.
       The transition makes the focus effect smooth */
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: .8rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      color: var(--slate);
      background: #f8fafc;
      transition: border-color .2s, box-shadow .2s, background .2s;
      outline: none;
    }

    /* Focus state — highlights the active field with a blue border
       and a soft blue glow (box-shadow) */
    input:focus {
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }

    /* The submit button — full width, gradient background, no border.
       transform on hover lifts it slightly for a tactile feel */
    .btn {
      width: 100%;
      padding: .9rem;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      margin-top: .5rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37,99,235,.4);
    }
    .btn:active { transform: translateY(0); }

    /* Divider line with centered text */
    .divider {
      display: flex; align-items: center; gap: .75rem;
      color: var(--muted); font-size: .82rem; margin: 1.25rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Footer link */
    .footer-link { text-align: center; font-size: .88rem; color: var(--muted); }
    .footer-link a { color: var(--blue-dark); font-weight: 700; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    /* Error alert box */
    .alert {
      background: #fef2f2; border: 1px solid #fecaca;
      color: var(--error); border-radius: 10px;
      padding: .75rem 1rem; font-size: .88rem;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: .5rem;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <h1>Graduate Connect</h1>
    <p>Catholic University of Cameroon — CATUC Bamenda</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your account to continue</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert"><i class="bi bi-exclamation-circle-fill"></i>{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" placeholder="you@example.com" required autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <div class="divider">or</div>
    <div class="footer-link">
      Don't have an account? <a href="/accounts/register/">Create one free</a>
    </div>
  </div>
</div>
</body>
</html>
