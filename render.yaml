databases:
  - name: graduate-connect-db
    databaseName: graduate_connect
    plan: free

services:
  # Django Backend
  - type: web
    name: graduate-connect-api
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn graduate_connect.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "graduate-connect-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: graduate-connect-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://graduate-connect-frontend.onrender.com"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # React Frontend
  - type: web
    name: graduate-connect-frontend
    plan: free
    runtime: node
    buildCommand: "npm install && npx vite build"
    startCommand: "npx serve -s dist -l $PORT"
    rootDir: linkedin-react-frontend
    envVars:
      - key: VITE_API_URL
        value: "https://graduate-connect-api.onrender.com/api"
      - key: NODE_VERSION
        value: "20.0.0"
